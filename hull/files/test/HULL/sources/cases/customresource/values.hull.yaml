      dbzm-kamel-issue-311:
        apiVersion: camel.apache.org/v1
        kind: Integration
        spec:
          sources:
          - name: dbzm-simple.yaml
            language: java
            content: |-
              _HT/hull.util.tools.file.get:PATH:"files/code-java-simple.java"
          - name: dbzm-medium.yaml
            language: java
            content: |-
              _HT/hull.util.tools.file.get:PATH:"files/code-java-medium.java"
          - name: dbzm-complex.yaml
            language: yaml
            content: |-
              _HT/hull.util.tools.file.get:PATH:"files/code-java-complex.java"
    
      issue-339:
        apiVersion: camel.apache.org/v1
        kind: Integration
        spec:
          forProvider:
            inlinePolicy:
              - name: plain-json-string
                policy: |-
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Effect": "Allow",
                          "Resource": "*",
                          "Action": "ssm:GetParameter*"
                        }
                      ]
                    }
              - name: interpreted-as-flow-style-yaml
                policy: |-
                  _HT!
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Effect": "{{ printf "%s" "Allow" }}",
                          "Resource": "*",
                          "Action": "ssm:GetParameter*"
                        }
                      ]
                    }
              - name: interpreted-and-serialized-flow-style-yaml
                policy: |-
                  _HT!toPrettyJson|
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "{{ printf "%s" "Allow" }}",
                        "Resource": "*",
                        "Action": "ssm:GetParameter*"
                      }
                    ]
                  }
              - name: interpreted-and-serialized-block-style-yaml
                policy: |-
                  _HT!toPrettyJson|
                  Version: "2012-10-17"
                  Statement: 
                  - Effect: "{{ printf "%s" "Allow" }}"
                    Resource: "*"
                    Action: "ssm:GetParameter*"
      
      conditionals-true:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        conditionals:
          decryption:
            condition: _HT*hull.config.specific.kustomization.encryption
            references:
            - spec.decryption    
          sourceref:
            condition: _HT*hull.config.specific.kustomization.i§have§dots§in§my§name
            references:
            - spec.sourceRef
          dotref:
            condition: _HT*hull.config.specific.kustomization.dotref
            references:
            - spec.path§with§dots
        spec:
          interval: "1m0s"
          path: "./flux"
          prune: true
          sourceRef:
            kind: GitRepository
            name: flux-system
          decryption:
            provider: sops
            serviceAccountName: sops-identity
            secretRef:
              name: sops-keys-and-credentials
          path.with.dots:
            prop_a: hello
            prop_b: goodbye

      conditionals-false:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        conditionals:
          decryption:
            condition: _HT?not _HT*hull.config.specific.kustomization.encryption
            references:
            - spec.decryption
          sourceref:
            condition: _HT?not _HT*hull.config.specific.kustomization.i§have§dots§in§my§name
            references:
            - spec.sourceRef
          dotref:
            condition: _HT?not _HT*hull.config.specific.kustomization.dotref
            references:
            - spec.path§with§dots
        spec:
          interval: "1m0s"
          path: "./flux"
          prune: true
          sourceRef:
            kind: GitRepository
            name: flux-system
          decryption:
            provider: sops
            serviceAccountName: sops-identity
            secretRef:
              name: sops-keys-and-credentials
          path.with.dots:
            prop_a: hello
            prop_b: goodbye

      conditionals-hidden-disabled:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        enabled: _HT*hull.config.specific.this_is_false
        conditionals:
          decryption:
            condition: _HT*hull.config.specific.kustomization.encryption_not_exists
            references:
            - spec.decryption
          broken:
            condition: _HT*hull.config.specific.kustomization.broken
            references:
            - spec.prune
        spec:
          interval: "1m0s"
          path: "./flux"
          prune: true
          sourceRef:
            kind: GitRepository
            name: flux-system
          decryption:
            provider: sops
            serviceAccountName: sops-identity
            secretRef:
              name: sops-keys-and-credentials